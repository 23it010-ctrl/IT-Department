{% extends "base.html" %}
{% block content %}
<div class="row mt-4">
    <div class="col-12 border-bottom pb-3 mb-4">
        <h2 class="fw-bold"><i class="fa-solid fa-address-book me-2"></i>Contact Information</h2>
    </div>
</div>

<div class="row justify-content-center">
    <!-- Contact Info -->
    <div class="col-md-5 mb-4">
        <div class="card h-100 border rounded-3 p-4 bg-transparent shadow-none">
            <div class="card-body">
                <div class="d-flex align-items-center mb-4">
                    <i class="fa-solid fa-map-marker-alt fa-2x text-muted me-3"></i>
                    <h4 class="card-title fw-bold mb-0">Visit Us</h4>
                </div>
                <p class="card-text text-muted mb-4" style="white-space: pre-wrap; font-size: 1.1rem; line-height: 1.6;">{{ address }}</p>
                
                {% if youtube or instagram %}
                <div class="pt-3 border-top">
                    <h5 class="fw-bold mb-3 text-muted fs-6 text-uppercase">Social Media</h5>
                    <div class="d-flex gap-3">
                        {% if youtube %}
                        <a href="{{ youtube }}" target="_blank" class="text-decoration-none text-muted" aria-label="YouTube">
                            <i class="fa-brands fa-youtube fa-2x hover-color-primary" style="transition: color 0.2s;"></i>
                        </a>
                        {% endif %}
                        {% if instagram %}
                        <a href="{{ instagram }}" target="_blank" class="text-decoration-none text-muted" aria-label="Instagram">
                            <i class="fa-brands fa-instagram fa-2x hover-color-primary" style="transition: color 0.2s;"></i>
                        </a>
                        {% endif %}
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
    
    <!-- Phone / Email -->
    <div class="col-md-5 mb-4">
        <div class="card h-100 border rounded-3 p-4 bg-transparent shadow-none">
            <div class="card-body">
                <div class="d-flex align-items-center border-bottom pb-4 mb-4">
                    <i class="fa-solid fa-envelope fa-2x text-muted me-3"></i>
                    <div>
                        <h4 class="card-title fw-bold mb-1">Email</h4>
                        <a href="mailto:{{ email }}" class="text-decoration-none" style="font-size: 1.1rem;">{{ email }}</a>
                    </div>
                </div>
                
                <div class="d-flex align-items-center">
                    <i class="fa-solid fa-phone fa-2x text-muted me-3"></i>
                    <div>
                        <h4 class="card-title fw-bold mb-1">Call Us</h4>
                        <p class="text-muted mb-0" style="font-size: 1.1rem;">{{ phone }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mt-2 mb-5">
    <div class="col-12">
        <h4 class="fw-bold mb-3"><i class="fa-solid fa-map-location-dot me-2"></i>Find Us On The Map</h4>
        <div class="border rounded-3 overflow-hidden shadow-none">
            <iframe 
                src="https://maps.google.com/maps?q={{ address | urlencode }}&t=&z=14&ie=UTF8&iwloc=&output=embed" 
                width="100%" 
                height="450" 
                style="border:0; display: block;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>
</div>
{% endblock %}
