{% extends "base.html" %}
{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="display-1 text-primary fw-bold mb-4">404</div>
            <h2 class="fw-bold mb-3">Page Not Found</h2>
            <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved. Use the button below to head back to the homepage.</p>
            <a href="{{ url_for('home') }}" class="btn btn-primary rounded-pill px-5 fw-bold shadow-sm">
                <i class="fa-solid fa-house me-2"></i>Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
