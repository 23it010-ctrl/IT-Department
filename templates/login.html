{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="fa-solid fa-user-circle me-2"></i>Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <input type="text" class="form-control" name="username" required placeholder="Enter your username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control" name="password" required placeholder="Enter your password">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary fw-bold py-2">Login to Dashboard</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0">Are you a new student? <a href="{{ url_for('register') }}" class="fw-bold">Register Here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
